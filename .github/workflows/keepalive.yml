name: Keep AIIA App Alive

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  restart-if-down:
    runs-on: ubuntu-latest
    steps:
      - name: Check and restart PM2 if down
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: 2222
          script: |
            source /home/aiinstit/nodevenv/aiia-app/18/bin/activate 2>/dev/null
            if ! pgrep -f "aiia-app/dist/index.js" > /dev/null 2>&1; then
              echo "App is down, restarting..."
              cd /home/aiinstit/aiia-app
              DATABASE_URL="postgresql://neondb_owner:npg_pP0FnWf3beZY@ep-cool-cake-a58hddne.us-east-2.aws.neon.tech/neondb?sslmode=require" \
              SESSION_SECRET="aiia_session_secret_2024" \
              SMTP_USER="aiinstituteafrica.com" \
              SMTP_PASS="cglG5GTmljaBp959" \
              NODE_ENV=production \
              pm2 start dist/index.js --name aiia-app --update-env
              pm2 save
              echo "App restarted successfully"
            else
              echo "App is running fine"
            fi
